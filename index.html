<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Hot Meal Food Ordering System - A premium, frontend-only food ordering catalog with real-time simulated order tracking.">
  <title>Gourmet Kitchen | Exquisite Hot Meals</title>
  <!-- Standard Favicon link -->
  <link rel="icon" type="image/svg+xml" href="/assets/brand/logo.svg" onerror="this.href='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍳</text></svg>'">
  <!-- Stylesheets -->
  <link rel="stylesheet" href="/src/css/index.css">
</head>
<body class="bg-background min-h-screen flex flex-col justify-between">

  <!-- ============================================ -->
  <!-- CUSTOMER HEADER (Desktop Navigation)         -->
  <!-- ============================================ -->
  <header id="nav-header" class="fixed top-0 left-0 right-0 z-40 bg-white/85 backdrop-blur-md border-b border-secondary/5 transition-all">
    <div class="max-w-7xl mx-auto px-4 md:px-8 h-20 flex items-center justify-between">
      <!-- Logo / Branding -->
      <div class="flex items-center gap-2.5 cursor-pointer" onclick="window.app.switchView('home')">
        <div class="w-10 h-10 bg-accent rounded-2xl flex items-center justify-center text-white shadow-accent-glow">
          <svg class="w-5.5 h-5.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 18v-5.25m0 0a3 3 0 00-3-3H9.75a3 3 0 00-3 3h15.375M12 13.5h3.75M9 15h3.375c.621 0 1.125-.504 1.125-1.125V11.25c0-.621-.504-1.125-1.125-1.125H9.75M9.663 5.378A4 4 0 100 11.25c0 .621.504 1.125 1.125 1.125H9.75M12 3v18M3 12h18"/>
          </svg>
        </div>
        <span class="font-display font-bold text-xl text-primary tracking-tight">Gourmet<span class="text-accent">Kitchen</span></span>
      </div>

      <!-- Navigation routes -->
      <nav class="hidden md:flex items-center gap-8 text-sm font-medium">
        <button data-route="home" onclick="window.app.switchView('home')" class="text-secondary-light hover:text-primary transition-colors cursor-pointer">Home</button>
        <button data-route="catalog" onclick="window.app.switchView('catalog')" class="text-secondary-light hover:text-primary transition-colors cursor-pointer">Menu Catalog</button>
        <button data-route="track-order" onclick="window.app.switchView('track-order')" class="text-secondary-light hover:text-primary transition-colors cursor-pointer">Track Order</button>
        <button data-route="apply" onclick="window.app.switchView('apply')" class="text-secondary-light hover:text-primary transition-colors cursor-pointer">Join Us</button>
        <button onclick="window.app.switchView('admin-dash')" class="text-secondary hover:text-accent font-semibold flex items-center gap-1.5 transition-colors cursor-pointer">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.325.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.43l-1.003.828c-.293.241-.438.613-.43.992a7.723 7.723 0 010 .255c-.008.378.137.75.43.991l1.004.827c.424.35.534.955.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.47 6.47 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.281c-.09.543-.56.94-1.11.94h-2.594c-.55 0-1.019-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.43l1.004-.827c.292-.24.437-.613.43-.991a6.936 6.936 0 010-.255c.007-.38-.138-.751-.43-.992l-1.004-.827a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.086.22-.128.332-.183.582-.495.644-.869l.214-1.28z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          Admin Panel
        </button>
      </nav>

      <!-- Cart Button desktop -->
      <button 
        onclick="window.app.openCartDrawer()"
        class="relative bg-background hover:bg-background-dark border border-secondary/10 p-3.5 rounded-2xl text-primary hover:text-accent transition-all cursor-pointer flex items-center justify-center active:scale-95 shadow-sm"
        aria-label="Shopping Cart"
      >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5V6a3.75 3.75 0 10-7.5 0v4.5m11.356-1.993l1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 01-1.12-1.243l1.264-12A1.125 1.125 0 015.513 7.5h12.974c.576 0 1.059.435 1.119 1.007zM8.625 10.5a.375.375 0 11-.75 0 .375.375 0 01.75 0zm7.5 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z"/>
        </svg>
        <span class="cart-count-badge absolute -top-1.5 -right-1.5 bg-accent text-white text-[10px] font-bold w-5.5 h-5.5 rounded-full flex items-center justify-center shadow-md border border-white hidden">0</span>
      </button>
    </div>
  </header>

  <!-- ============================================ -->
  <!-- ADMIN SIDEBAR NAVIGATION                     -->
  <!-- ============================================ -->
  <aside id="sidebar-admin" class="fixed top-0 bottom-0 left-0 w-64 bg-primary text-white flex-col border-r border-primary-dark z-40 hidden">
    <!-- Brand / Return -->
    <div class="h-20 border-b border-primary-light flex items-center px-6 gap-2.5 cursor-pointer" onclick="window.app.switchView('home')">
      <div class="w-8 h-8 bg-accent rounded-xl flex items-center justify-center text-white">
        <svg class="w-4.5 h-4.5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 21a9.004 9.004 0 008.716-6.747M12 21a9.004 9.004 0 01-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9S9.515 3 12 3m0 0a8.997 8.997 0 017.843 4.582M12 3a8.997 8.997 0 00-7.843 4.582m15.686 0A11.953 11.953 0 0112 10.5c-2.998 0-5.74-1.1-7.843-2.918m15.686 0A8.959 8.959 0 0121 12c0 .778-.099 1.533-.284 2.253m0 0A17.919 17.919 0 0112 16.5c-3.162 0-6.133-.815-8.716-2.247m0 0A9.015 9.015 0 013 12c0-.778.099-1.533.284-2.253"/></svg>
      </div>
      <span class="font-display font-bold text-base tracking-tight">Admin<span class="text-accent">Portal</span></span>
    </div>

    <!-- Links list -->
    <nav class="flex-grow py-5 px-3 space-y-0.5 text-xs">
      <span class="px-2.5 text-[9px] uppercase tracking-wider text-white/40 font-bold block mb-1.5">Metrics</span>
      <button data-admin-route="admin-dash" onclick="window.app.switchView('admin-dash')" class="w-full text-left px-2.5 py-2 rounded-lg transition-all cursor-pointer flex items-center gap-2 text-white/60 hover:text-white hover:bg-white/5 font-medium">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 6a7.5 7.5 0 107.5 7.5h-7.5V6z"/><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 10.5H21A7.5 7.5 0 0013.5 3v7.5z"/></svg>
        Dashboard
      </button>

      <span class="px-2.5 text-[9px] uppercase tracking-wider text-white/40 font-bold block mb-1.5 pt-5">Operations</span>
      <button data-admin-route="admin-orders" onclick="window.app.switchView('admin-orders')" class="w-full text-left px-2.5 py-2 rounded-lg transition-all cursor-pointer flex items-center gap-2 text-white/60 hover:text-white hover:bg-white/5 font-medium">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M8.25 6.75h12M8.25 12h12m-12 5.25h12M3.75 6.75h.007v.008H3.75V6.75zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zM3.75 12h.007v.008H3.75V12zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0zm-3.375 5.25h.007v.008H3.75v-.008zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z"/></svg>
        Orders Ledger
      </button>
      <button data-admin-route="admin-customers" onclick="window.app.switchView('admin-customers')" class="w-full text-left px-2.5 py-2 rounded-lg transition-all cursor-pointer flex items-center gap-2 text-white/60 hover:text-white hover:bg-white/5 font-medium">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19.128a9.38 9.38 0 002.625.372 9.337 9.337 0 004.121-.952 4.125 4.125 0 00-7.533-2.493M15 19.128v-.003c0-1.113-.285-2.16-.786-3.07M15 19.128v.106A12.318 12.318 0 018.624 21c-2.331 0-4.512-.645-6.374-1.766l-.001-.109a6.375 6.375 0 0111.964-3.07M12 6.375a3.375 3.375 0 11-6.75 0 3.375 3.375 0 016.75 0zm8.25 2.25a2.625 2.625 0 11-5.25 0 2.625 2.625 0 015.25 0z"/></svg>
        Customer Profiles
      </button>
    </nav>

    <!-- Logout / Switch role -->
    <div class="p-3 border-t border-primary-light">
      <button onclick="window.app.switchView('home')" class="w-full bg-white/5 hover:bg-white/10 text-white/80 hover:text-white py-2 rounded-lg transition-all text-[11px] font-semibold cursor-pointer flex items-center justify-center gap-1.5">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0013.5 3h-6a2.25 2.25 0 00-2.25 2.25v13.5A2.25 2.25 0 007.5 21h6a2.25 2.25 0 002.25-2.25V15M12 9l-3 3m0 0l3 3m-3-3h12.75"/></svg>
        Exit Admin Panel
      </button>
    </div>
  </aside>

  <!-- ============================================ -->
  <!-- MAIN VIEWPORT CONTAINER                      -->
  <!-- ============================================ -->
  <main id="main-body" class="flex-grow pt-24 pb-24 lg:pb-12 transition-all duration-300">
    <div id="content-wrapper" class="max-w-7xl mx-auto px-4 md:px-8">
      <div id="view-container" class="animate-fade-in">
        <!-- Render targets dynamic -->
        <div class="flex items-center justify-center py-24">
          <div class="w-8 h-8 border-4 border-accent border-t-transparent rounded-full animate-spin"></div>
        </div>
      </div>
    </div>
  </main>

  <!-- ============================================ -->
  <!-- CUSTOMER FOOTER                              -->
  <!-- ============================================ -->
  <footer class="bg-primary-dark text-white/50 py-6 border-t border-white/5">
    <div class="max-w-7xl mx-auto px-4 md:px-8 flex flex-col md:flex-row items-center justify-between gap-4 text-xs">
      <p>© 2026 Gourmet Kitchen. All rights reserved. Created for VibeUI Competition.</p>
      <div class="flex gap-6">
        <span class="hover:text-white cursor-pointer">Privacy Policy</span>
        <span class="hover:text-white cursor-pointer">Terms of Service</span>
        <span class="hover:text-white cursor-pointer">Support</span>
      </div>
    </div>
  </footer>

  <!-- ============================================ -->
  <!-- MOBILE BOTTOM STICKY BAR                     -->
  <!-- ============================================ -->
  <nav id="nav-mobile" class="fixed bottom-0 left-0 right-0 z-40 bg-white/95 backdrop-blur-md border-t border-secondary/5 h-16 flex md:hidden items-center justify-around text-[10px] font-semibold text-secondary-light">
    <button onclick="window.app.switchView('home')" class="flex flex-col items-center gap-1 cursor-pointer hover:text-accent">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 12l8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25"/></svg>
      Home
    </button>
    <button onclick="window.app.switchView('catalog')" class="flex flex-col items-center gap-1 cursor-pointer hover:text-accent">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 012.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z"/></svg>
      Menu
    </button>
    <button onclick="window.app.switchView('track-order')" class="flex flex-col items-center gap-1 cursor-pointer hover:text-accent">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
      Track
    </button>
    <button onclick="window.app.switchView('apply')" class="flex flex-col items-center gap-1 cursor-pointer hover:text-accent">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M20.25 14.15v4.25c0 1.094-.787 2.036-1.872 2.18-2.087.277-4.216.42-6.378.42s-4.291-.143-6.378-.42c-1.085-.144-1.872-1.086-1.872-2.18v-4.25m16.5 0a2.18 2.18 0 00.75-1.661V8.706c0-1.081-.768-2.015-1.837-2.175a48.114 48.114 0 00-3.413-.387m4.5 8.006c-.194.165-.42.295-.673.38A23.978 23.978 0 0112 15.75c-2.648 0-5.195-.429-7.577-1.22a2.016 2.016 0 01-.673-.38m0 0A2.18 2.18 0 013 12.489V8.706c0-1.081.768-2.015 1.837-2.175a48.111 48.111 0 013.413-.387m7.5 0V5.25A2.25 2.25 0 0013.5 3h-3a2.25 2.25 0 00-2.25 2.25v.894m7.5 0a48.667 48.667 0 00-7.5 0M12 12.75h.008v.008H12v-.008z"/></svg>
      Join Us
    </button>
    <button onclick="window.app.openCartDrawer()" class="relative flex flex-col items-center gap-1 cursor-pointer hover:text-accent">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5V6a3.75 3.75 0 10-7.5 0v4.5m11.356-1.993l1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 01-1.12-1.243l1.264-12A1.125 1.125 0 015.513 7.5h12.974c.576 0 1.059.435 1.119 1.007zM8.625 10.5a.375.375 0 11-.75 0 .375.375 0 01.75 0zm7.5 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z"/>
      </svg>
      Cart
      <span class="cart-count-badge absolute -top-1 -right-2 bg-accent text-white text-[8px] font-bold w-4 h-4 rounded-full flex items-center justify-center shadow-md hidden">0</span>
    </button>
  </nav>

  <!-- ============================================ -->
  <!-- SHOPPING CART SLIDE OUT DRAWER               -->
  <!-- ============================================ -->
  <div id="cart-drawer" class="fixed inset-y-0 right-0 w-full max-w-md bg-white border-l border-secondary/10 shadow-2xl z-50 transform translate-x-full transition-transform duration-300 flex flex-col justify-between">
    <!-- Header -->
    <div class="h-20 border-b border-secondary/5 px-6 flex items-center justify-between">
      <h3 class="font-display font-bold text-lg text-primary flex items-center gap-2">
        <svg class="w-5.5 h-5.5 text-accent" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 00-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 00-16.536-1.84M7.5 14.25L5.106 5.272M6 20.25a.75.75 0 11-1.2 0 .75.75 0 011.2 0zm12.75 0a.75.75 0 11-1.2 0 .75.75 0 011.2 0z"/></svg>
        Shopping Cart
      </h3>
      <button onclick="window.app.closeCartDrawer()" class="text-secondary/40 hover:text-primary p-2 rounded-full hover:bg-background transition-colors cursor-pointer">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
    </div>
    
    <!-- Items (Scrollable List) -->
    <div id="cart-drawer-items" class="flex-grow p-6 space-y-4 overflow-y-auto">
      <!-- Injected dynamically -->
    </div>

    <!-- Bottom Pricing calculation -->
    <div id="cart-drawer-footer" class="p-6 border-t border-secondary/5 bg-background/30">
      <!-- Injected dynamically -->
    </div>
  </div>

  <!-- ============================================ -->
  <!-- DETAILS LIGHTBOX MODAL                       -->
  <!-- ============================================ -->
  <div id="details-modal" class="fixed inset-0 z-50 bg-primary-dark/40 backdrop-blur-sm hidden items-center justify-center">
    <div class="absolute inset-0 cursor-pointer" onclick="window.app.closeMealDetails()"></div>
    <div id="modal-content-inner" class="relative z-10 w-full max-w-4xl flex items-center justify-center">
      <!-- Content injected dynamically -->
    </div>
  </div>

  <!-- App Main Bundle -->
  <script type="module" src="/src/js/app.js"></script>
</body>
</html>
